#-----#
# Bar #
#-----#

# ---waybar---
# bar {
    # swaybar_command waybar
# }

bar {
    position top
    status_command while date +'%Y-%m-%d %H:%M:%S'; do sleep 1; done
    height 30
    font JetBrainsMono 10
    strip_workspace_numbers yes

    colors {
        background #00000000
        statusline #ffffff
        separator #666666

        focused_workspace  #B8B8B8 #B8B8B8 #000000
        active_workspace   #343434 #343434 #ffffff
        inactive_workspace #343434 #343434 #ffffff
        urgent_workspace   #7E97B6 #7E97B6 #ffffff
    }
}