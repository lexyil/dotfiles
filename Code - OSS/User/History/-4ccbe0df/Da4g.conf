#-----#
# Bar #
#-----#

# ---waybar---
# bar {
    # swaybar_command waybar
# }

# ---native---
bar {
    position top
    status_command while date +'%Y-%m-%d %H:%M:%S'; do sleep 1; done
    height 30
    font JetBrainsMono 10
    strip_workspace_numbers yes


    colors {
        background #00000000
        statusline #ffffff
        separator #666666
        
        focused_workspace  #AEB7C2 #AEB7C2 #ffffff
        active_workspace   #2D333b #2D333b #ffffff
        inactive_workspace #2D333b #2D333b #ffffff
        urgent_workspace   #5b7ea8 #5b7ea8 #ffffff
    }
}