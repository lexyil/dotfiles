#------------#
# Appearance #
#------------#

gaps inner 8
gaps outer 0
default_border pixel 2
default_floating_border pixel 2
font pango:JetBrainsMono Nerd Font 10

# ---colors---
# format: client.<class> <border> <background> <text> <indicator> [<child_border>]

client.focused          #3D4453 #2B303B #F4F7FB #5578A5
client.focused_inactive #2B303B #20242D #D7DDE8 #3D4453
client.unfocused        #20242D #171A21 #A8B2C5 #20242D
client.urgent           #5578A5 #20242D #F4F7FB #88AEE8
client.placeholder      #171A21 #171A21 #A8B2C5 #171A21
client.background       #0F1117

# ---optionals---
# smart_gaps on
# smart_borders on
# titlebar_padding 6 4
# hide_edge_borders smart
